workflows:
  ios-unsigned-ipa:
    name: Build Unsigned IPA for Sideloadly
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set iOS deployment target to 15.0
        script: |
          find . -name "Podfile" -exec sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/g' {} +
          
      - name: Disable Code Signing in Xcode
        script: |
          # حقن قيم فارغة لتخطي متطلبات التوقيع الإجبارية
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_ENTITLEMENTS = .*/CODE_SIGN_ENTITLEMENTS = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = .*/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
      - name: Get Flutter Packages
        script: |
          flutter pub get
          
      - name: Build Flutter iOS App
        script: |
          # بناء التطبيق بدون توقيع
          flutter build ios --release --no-codesign
          
      - name: Package Unsigned IPA
        script: |
          # أتمتة عملية إنشاء الـ Payload وضغطه كملف ipa
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r RickAndMorty.ipa Payload/
          
    artifacts:
      - build/ios/iphoneos/RickAndMorty.ipa